services:
  db:
    image: postgres:17-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ege_grader}
      POSTGRES_USER: ${POSTGRES_USER:-ege}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ege_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ege} -d ${POSTGRES_DB:-ege_grader}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: dev/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ege}:${POSTGRES_PASSWORD:-ege_dev}@db:5432/${POSTGRES_DB:-ege_grader}
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ..:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
